<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.9.1/dist/index.css">
</head>
<body>
    <div id="app">
        <el-button type="primary">{{ message }}</el-button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.9.1/dist/index.full.min.js"></script>
    <script>
        const { createApp, ref } = Vue
        createApp({
          setup() {
            const message = ref('Hello vue!')
            return {
              message
            }
          }
        }).use(ElementPlus).mount('#app')
    </script>
</body>
</html>
