<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽奖大转盘</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.9.1/dist/index.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
      .wheel-container { position: relative; width: 340px; height: 340px; }
      .wheel {
        width: 100%; height: 100%; border-radius: 50%;
        border: 8px solid #fff; box-shadow: 0 0 30px rgba(0,0,0,0.3);
        transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
      }
      .wheel-btn {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 70px; height: 70px; border-radius: 50%; background: #ff4757;
        color: #fff; font-size: 14px; font-weight: bold; border: 4px solid #fff;
        cursor: pointer; box-shadow: 0 4px 15px rgba(255,71,87,0.4);
        z-index: 10; display: flex; align-items: center; justify-content: center;
      }
      .wheel-btn:hover { background: #ff6b81; }
      .wheel-btn:disabled { background: #aaa; cursor: not-allowed; }
      .pointer {
        position: absolute; top: -18px; left: 50%; transform: rotate(180deg) translate(50%, -50%);
        width: 0; height: 0; border-left: 14px solid transparent;
        border-right: 14px solid transparent; border-bottom: 30px solid #ff4757;
        z-index: 10; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      }
      .result { margin-top: 24px; text-align: center; color: #fff; font-size: 20px; min-height: 30px; }
      .prize-input { margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
      .prize-input input { padding: 10px 14px; border: none; border-radius: 6px; font-size: 14px; width: 280px; }
      .prize-input .start-btn { padding: 8px 24px; border: none; border-radius: 6px; background: #ffa502; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; }
      .prize-input .start-btn:hover { background: #e69500; }
      .prize-input .start-btn:disabled { background: #aaa; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="app">
      <div style="display:flex;flex-direction:column;align-items:center;">
        <!-- 输入阶段 -->
        <div v-if="!started" class="prize-input">
          <h2 style="color:#fff;margin-bottom:8px;">输入奖项（空格分隔）</h2>
          <input v-model="inputText" placeholder="如：一等奖 二等奖 三等奖 谢谢参与" @keyup.enter="confirmPrizes" />
          <button class="start-btn" @click="confirmPrizes" :disabled="validCount < 2">确认开始</button>
        </div>
        <!-- 转盘阶段 -->
        <template v-else>
          <div class="wheel-container">
            <div class="pointer"></div>
            <canvas ref="wheelCanvas" width="340" height="340" class="wheel" :style="{transform: 'rotate(' + rotation + 'deg)'}"></canvas>
            <button class="wheel-btn" @click="spin" :disabled="spinning">抽奖</button>
          </div>
          <div class="result">
            <span v-if="result">🎉 恭喜获得：<strong>{{ result }}</strong></span>
          </div>
          <button style="margin-top:16px;padding:6px 16px;border:none;border-radius:6px;background:#fff;color:#764ba2;cursor:pointer;font-size:14px;" @click="reset">重新设置</button>
        </template>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.9.1/dist/index.full.min.js"></script>
    <script>
      const { createApp, ref, computed, nextTick } = Vue

      const COLORS = ['#ff4757','#ffa502','#2ed573','#1e90ff','#a55eea','#ff6348','#57606f','#747d8c','#e84393','#00b894','#0984e3','#6c5ce7']

      createApp({
        setup() {
          const inputText = ref('')
          const started = ref(false)
          const prizes = ref([])

          const wheelCanvas = ref(null)
          const rotation = ref(0)
          const spinning = ref(false)
          const result = ref('')

          const validCount = computed(() => inputText.value.trim().split(/\s+/).filter(Boolean).length)

          function confirmPrizes() {
            const words = inputText.value.trim().split(/\s+/).filter(Boolean)
            if (words.length < 2) return
            prizes.value = words.map((name, i) => ({ name, color: COLORS[i % COLORS.length] }))
            started.value = true
            nextTick(() => drawWheel())
          }
          function reset() {
            started.value = false
            result.value = ''
            rotation.value = 0
          }

          function drawWheel() {
            const canvas = wheelCanvas.value
            if (!canvas) return
            const ctx = canvas.getContext('2d')
            const cx = canvas.width / 2
            const cy = canvas.height / 2
            const r = cx - 4
            const list = prizes.value
            const arc = (2 * Math.PI) / list.length

            ctx.clearRect(0, 0, canvas.width, canvas.height)
            list.forEach((prize, i) => {
              const startAngle = i * arc - Math.PI / 2
              const endAngle = startAngle + arc
              ctx.beginPath()
              ctx.moveTo(cx, cy)
              ctx.arc(cx, cy, r, startAngle, endAngle)
              ctx.closePath()
              ctx.fillStyle = prize.color
              ctx.fill()
              ctx.strokeStyle = '#fff'
              ctx.lineWidth = 2
              ctx.stroke()
              ctx.save()
              ctx.translate(cx, cy)
              ctx.rotate(startAngle + arc / 2)
              ctx.fillStyle = '#fff'
              ctx.font = 'bold 14px sans-serif'
              ctx.textAlign = 'center'
              ctx.fillText(prize.name, r * 0.6, 5)
              ctx.restore()
            })
            spin();
          }

          function spin() {
            if (spinning.value) return
            spinning.value = true
            result.value = ''
            const list = prizes.value
            const prizeIndex = Math.floor(Math.random() * list.length)
            const arc = 360 / list.length
            const targetAngle = 360 - (prizeIndex * arc + arc / 2)
            const totalRotation = 360 * 8 + targetAngle
            rotation.value += totalRotation

            setTimeout(() => {
              spinning.value = false
              result.value = list[prizeIndex].name
            }, 4200)
          }

          return { inputText, started, prizes, wheelCanvas, rotation, spinning, result, validCount, confirmPrizes, reset, spin }
        }
      }).use(ElementPlus).mount('#app')
    </script>
</body>
</html>
